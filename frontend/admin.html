<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Panel | GourmetHub</title>
    <link rel="stylesheet" href="style.css">
    <style>
        .admin-container {
            padding: 120px 10% 80px;
            max-width: 1200px;
            margin: 0 auto;
        }
        .admin-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 40px;
        }
        .form-card {
            background: var(--bg-card);
            padding: 30px;
            border-radius: 12px;
            border: 1px solid var(--glass);
            margin-bottom: 40px;
            display: none; /* Toggle this via JS */
        }
        .form-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
        }
        .form-group {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }
        input, select, textarea {
            padding: 12px;
            background: var(--bg-dark);
            border: 1px solid var(--glass);
            color: white;
            border-radius: 5px;
            font-family: inherit;
        }
        .admin-table {
            width: 100%;
            border-collapse: collapse;
            background: var(--bg-card);
            border-radius: 12px;
            overflow: hidden;
        }
        .admin-table th, .admin-table td {
            text-align: left;
            padding: 15px 20px;
            border-bottom: 1px solid var(--glass);
        }
        .admin-table th {
            background: rgba(197, 160, 89, 0.1);
            color: var(--primary-gold);
            font-family: 'Playfair Display', serif;
        }
        .btn-sm {
            padding: 8px 15px;
            font-size: 0.8rem;
            cursor: pointer;
            border-radius: 4px;
            border: none;
            transition: var(--transition-smooth);
        }
        .btn-edit { background: #3498db; color: white; margin-right: 5px; }
        .btn-delete { background: var(--accent-red); color: white; }
        .btn-edit:hover, .btn-delete:hover { opacity: 0.8; }
        
        .modal-overlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.8);
            z-index: 2000;
            justify-content: center;
            align-items: center;
        }
    </style>
</head>
<body>
    <nav style="background: rgba(10, 10, 10, 0.95); padding: 15px 10%; border-bottom: 1px solid var(--glass);">
        <a href="index.html" class="logo">GourmetHub <span style="font-size: 0.8rem; color: var(--text-muted);">Admin</span></a>
        <a href="index.html" class="btn-order">Back to Site</a>
    </nav>

    <div class="admin-container">
        <!-- Tab Navigation -->
        <div style="display: flex; gap: 20px; margin-bottom: 40px; border-bottom: 1px solid var(--glass); padding-bottom: 10px;">
            <button class="filter-btn active" id="tab-menu" onclick="switchTab('menu')">Menu Management</button>
            <button class="filter-btn" id="tab-orders" onclick="switchTab('orders')">Customer Orders</button>
        </div>

        <!-- Menu Management Section -->
        <div id="section-menu">
            <div class="admin-header">
                <h2>Menu Items</h2>
                <button class="btn-primary" id="btn-add-new">+ Add New Item</button>
            </div>

            <!-- Add/Edit Form -->
            <div class="form-card" id="form-container">
                <h3 id="form-title" style="margin-bottom: 20px;">Add New Food Item</h3>
                <form id="food-form">
                    <input type="hidden" id="food-id">
                    <div class="form-grid">
                        <div class="form-group">
                            <label>Item Name</label>
                            <input type="text" id="name" required placeholder="e.g. Wagyu Beef Steak">
                        </div>
                        <div class="form-group">
                            <label>Price ($)</label>
                            <input type="number" id="price" required placeholder="0.00">
                        </div>
                        <div class="form-group">
                            <label>Category</label>
                            <select id="category" required>
                                <option value="Starters">Starters</option>
                                <option value="Main Course">Main Course</option>
                                <option value="Desserts">Desserts</option>
                                <option value="Beverages">Beverages</option>
                            </select>
                        </div>
                        <div class="form-group">
                            <label>Type</label>
                            <select id="type" required>
                                <option value="veg">Vegetarian</option>
                                <option value="non-veg">Non-Vegetarian</option>
                            </select>
                        </div>
                        <div class="form-group" style="grid-column: span 2;">
                            <label>Image URL</label>
                            <input type="url" id="image" required placeholder="https://unsplash.com/...">
                        </div>
                        <div class="form-group" style="grid-column: span 2;">
                            <label>Short Description</label>
                            <textarea id="description" rows="3" required placeholder="Tell guests about this dish..."></textarea>
                        </div>
                    </div>
                    <div style="margin-top: 30px; display: flex; gap: 10px;">
                        <button type="submit" class="btn-primary" style="border: none; cursor: pointer;">Save Item</button>
                        <button type="button" class="btn-outline" id="btn-cancel" style="cursor: pointer;">Cancel</button>
                    </div>
                </form>
            </div>

            <!-- Food List Table -->
            <table class="admin-table">
                <thead>
                    <tr>
                        <th>Item</th>
                        <th>Category</th>
                        <th>Type</th>
                        <th>Price</th>
                        <th>Actions</th>
                    </tr>
                </thead>
                <tbody id="admin-table-body"></tbody>
            </table>
        </div>

        <!-- Orders Management Section -->
        <div id="section-orders" style="display: none;">
            <div class="admin-header">
                <h2>Incoming Orders</h2>
            </div>
            <table class="admin-table">
                <thead>
                    <tr>
                        <th>Customer</th>
                        <th>Items</th>
                        <th>Total</th>
                        <th>Status</th>
                        <th>Actions</th>
                    </tr>
                </thead>
                <tbody id="orders-table-body"></tbody>
            </table>
        </div>
    </div>

    <script src="admin.js"></script>
</body>
</html>
